ximum_day;\n}\n\nvoid process_nmea(char *buf, int len) {\n  buf[len] = 0;\n  if (strncmp(buf, \"$GPRMC\", 6) == 0 ||\n      strncmp(buf, \"$GNRMC\", 6) == 0) {\n    char parsed_time[20] = {};\n    char parsed_date[20] = {};\n    char status = 0;\n    const bool valid = nmea_checksum_valid(buf) &&\n      sscanf(buf + 6, \",%10[^,],%c,%*f,%*c,%*f,%*c,%*f,%*f,%6[^,]\", parsed_time, &status, parsed_date) == 3 &&\n      status == 'A' && nmea_time_valid(parsed_time) && nmea_date_valid(parsed_date);\n    if (valid) {\n      strcpy(utc_time, parsed_time);\n      strcpy(date, parsed_date);\n      if (!time_fixed) {\n        DBG_SERIAL.println(\"Time received. Ready to test some harnesses!\");\n        set_status(GOOD);\n      }\n      time_fixed = true;\n    } else if (!time_fixed) {\n      DBG_SERIAL.println(\"Failed to parse $GPRMC\");\n    }\n  }\n}\n"
